<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoShield - Advanced Crypto Fraud Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        input {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: monospace;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .result {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s;
        }
        
        .result.show {
            display: block;
        }
        
        .error-message {
            background: #fee;
            border-left: 5px solid #f44;
            padding: 20px;
            border-radius: 10px;
            color: #c00;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .risk-card {
            padding: 25px;
            border-radius: 15px;
            background: white;
        }
        
        .risk-high {
            border-left: 8px solid #ef4444;
            background: linear-gradient(135deg, #fff5f5 0%, white 100%);
        }
        
        .risk-medium {
            border-left: 8px solid #f59e0b;
            background: linear-gradient(135deg, #fffbeb 0%, white 100%);
        }
        
        .risk-low {
            border-left: 8px solid #eab308;
            background: linear-gradient(135deg, #fefce8 0%, white 100%);
        }
        
        .risk-very-low {
            border-left: 8px solid #22c55e;
            background: linear-gradient(135deg, #f0fdf4 0%, white 100%);
        }
        
        .risk-level {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .risk-score {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 15px 0;
            color: #667eea;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .info-item {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .info-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .info-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            word-break: break-all;
        }
        
        .reasons-list {
            list-style: none;
            margin-top: 20px;
        }
        
        .reasons-list li {
            padding: 12px;
            margin: 8px 0;
            background: #f7f7f7;
            border-radius: 8px;
            color: #333;
            border-left: 3px solid #667eea;
        }
        
        .warning-note {
            margin-top: 20px;
            padding: 15px;
            background: #fffbeb;
            border-radius: 10px;
            font-size: 0.9rem;
            color: #92400e;
            text-align: center;
            border: 1px solid #fde68a;
        }
        
        .advice-box {
            margin-top: 20px;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 10px;
            border-left: 4px solid #22c55e;
        }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .card { padding: 20px; }
            .input-group { flex-direction: column; }
            .risk-level { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ CryptoShield AI</h1>
            <p>Advanced Blockchain Fraud Detection • Real-time Etherscan Data</p>
        </div>
        
        <div class="card">
            <div class="input-group">
                <input type="text" id="walletInput" placeholder="Enter Ethereum wallet address (0x...)" />
                <button onclick="checkWallet()" id="checkBtn">🔍 Analyze Wallet</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>🔍 Analyzing blockchain data...</p>
                <p style="font-size: 0.85rem; margin-top: 10px;">Fetching real transaction data from Etherscan</p>
            </div>
            
            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        async function checkWallet() {
            const wallet = document.getElementById('walletInput').value.trim();
            const checkBtn = document.getElementById('checkBtn');
            
            if (!wallet) {
                alert('Please enter a wallet address!\nExample: 0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb5');
                return;
            }
            
            if (!wallet.startsWith('0x') || wallet.length !== 42) {
                alert('Invalid wallet address format!\nMust start with 0x and be exactly 42 characters long.');
                return;
            }
            
            // Show loading
            checkBtn.disabled = true;
            document.getElementById('loading').classList.add('show');
            document.getElementById('result').classList.remove('show');
            
            try {
                const response = await fetch('/check_wallet', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ wallet: wallet })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    displayError(data.error);
                } else {
                    displayResult(data);
                }
            } catch (error) {
                console.error('Error:', error);
                displayError('Network error: Could not connect to server. Make sure the server is running on port 5000');
            } finally {
                document.getElementById('loading').classList.remove('show');
                checkBtn.disabled = false;
            }
        }
        
        function displayError(errorMsg) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="error-message">
                    <strong>❌ Error</strong><br>
                    ${errorMsg}<br><br>
                    <small>💡 Troubleshooting tips:<br>
                    - Verify your Etherscan API key is correct in .env file<br>
                    - Check that the wallet address is valid<br>
                    - Wait a few seconds and try again<br>
                    - Visit https://etherscan.io/register to get a free API key</small>
                </div>
            `;
            resultDiv.classList.add('show');
        }
        
        function displayResult(data) {
            const resultDiv = document.getElementById('result');
            
            // Determine risk class and background
            let riskClass = '';
            if (data.risk_level.includes('HIGH')) {
                riskClass = 'risk-high';
            } else if (data.risk_level.includes('MEDIUM')) {
                riskClass = 'risk-medium';
            } else if (data.risk_level.includes('LOW') && !data.risk_level.includes('VERY')) {
                riskClass = 'risk-low';
            } else {
                riskClass = 'risk-very-low';
            }
            
            // Show warning if using invalid API
            let warningNote = '';
            if (!data.is_real_data) {
                warningNote = `
                    <div class="warning-note">
                        ⚠️ <strong>API Key Issue</strong><br>
                        Using limited data mode. To enable full features:<br>
                        1. Get a free API key from <a href="https://etherscan.io/register" target="_blank">Etherscan</a><br>
                        2. Add it to your .env file: ETHERSCAN_API_KEY=your_key_here<br>
                        3. Restart the server
                    </div>
                `;
            }
            
            const reasonsList = data.reasons.map(reason => `<li>${reason}</li>`).join('');
            
            resultDiv.innerHTML = `
                <div class="risk-card ${riskClass}">
                    <div class="risk-level">${data.risk_level}</div>
                    <div class="risk-score">Risk Score: ${data.risk_score}/100</div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">💰 Wallet Address</div>
                            <div class="info-value" style="font-size: 0.9rem;">${data.wallet.substring(0, 10)}...${data.wallet.substring(data.wallet.length - 8)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">📊 Transactions</div>
                            <div class="info-value">${data.transactions_found.toLocaleString()}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">💰 Total Volume</div>
                            <div class="info-value">${data.total_volume}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">⏰ Last Active</div>
                            <div class="info-value">${data.last_active}</div>
                        </div>
                        ${data.small_tx_count > 0 ? `
                        <div class="info-item">
                            <div class="info-label">⚠️ Micro-Txs</div>
                            <div class="info-value">${data.small_tx_count}</div>
                        </div>
                        ` : ''}
                        ${data.large_tx_count > 0 ? `
                        <div class="info-item">
                            <div class="info-label">💎 Large Txs (>10 ETH)</div>
                            <div class="info-value">${data.large_tx_count}</div>
                        </div>
                        ` : ''}
                        ${data.max_tx_amount > 0 ? `
                        <div class="info-item">
                            <div class="info-label">💵 Largest Tx</div>
                            <div class="info-value">${data.max_tx_amount} ETH</div>
                        </div>
                        ` : ''}
                    </div>
                    
                    ${data.reasons.length > 0 ? `
                    <div style="margin-top: 20px;">
                        <strong>⚠️ Detected Suspicious Patterns:</strong>
                        <ul class="reasons-list">
                            ${reasonsList}
                        </ul>
                    </div>
                    ` : ''}
                    
                    <div class="advice-box">
                        <strong>💡 Security Recommendation:</strong><br>
                        ${getAdvice(data.risk_level)}
                    </div>
                    
                    ${warningNote}
                </div>
            `;
            
            resultDiv.classList.add('show');
        }
        
        function getAdvice(riskLevel) {
            if (riskLevel.includes('HIGH')) {
                return "🔴 DO NOT interact with this wallet! It shows strong indicators of fraudulent activity. Report this address to blockchain security platforms immediately.";
            } else if (riskLevel.includes('MEDIUM')) {
                return "🟠 HIGH CAUTION: Verify all information independently. Consider using escrow services or a trusted third party for any transactions.";
            } else if (riskLevel.includes('LOW') && !riskLevel.includes('VERY')) {
                return "🟡 Exercise normal caution. While no major red flags were found, always verify addresses and start with small test transactions.";
            } else {
                return "🟢 This wallet appears to have normal activity patterns. However, always practice good security: double-check addresses, use hardware wallets for large amounts, and enable 2FA on exchanges.";
            }
        }
        
        // Add example wallet on load
        window.addEventListener('load', () => {
            document.getElementById('walletInput').value = '0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb5';
        });
        
        // Enter key support
        document.getElementById('walletInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkWallet();
            }
        });
    </script>
</body>
</html>
